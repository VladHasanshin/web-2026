<!DOCTYPE html>
<html lang="ru">
    <head>
        <title>Вход • Социальная сеть</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="./login_style.css">
        <script src="./login.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="login">
            <div class="decoration">
                <h1 class="decoration__title">Войти</h1>
                <img class="decoration__image" width="462" height="501" src="./img/happy_man.png" alt="Happy man">
            </div>
            <form class="form" action="#" method="post">
                <div class="form__error-banner"></div>
                <div class="field">
                    <label class="field__label" for="email">Электропочта</label>
                    <input class="field__input" type="email" id="email" name="email">
                    <p class="field__description">Введите электропочту в формате *****@***.**</p>
                </div>
                <div class="field">
                    <label class="field__label" for="password">Пароль</label>
                    <input class="field__input" type="password" id="password" name="password">
                </div>
                <button class="form__button">Продолжить</button>
            </form>
        </div>
    </body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Профиль • Социальная сеть</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./profile_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <a href="/LAB9/home"><img class="sidebar__icon" width="24" height="24" src="./img/home.svg" alt="Home" title="Home"></a>
        <a href="/LAB9/profile"><img class="sidebar__icon" width="24" height="24" src="./img/user.svg" alt="Profile" title="Profile"></a>
        <a href="/LAB9/create_post"><img class="sidebar__icon" width="24" height="24" src="./img/plus.svg" alt="Plus" title="New post"></a>
    </nav>
    <div class="profile">
        <div class="about">
            <img class="about__avatar" width="123" height="123" src="./img/vanya_denisov.jpg" alt="Vanya Denisov">
            <h1 class="about__name">Ваня Денисов</h1>
            <p class="about__bio">
                Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!
            </p>
            <div class="stats">
                <img class="stats__icon" width="16" height="16" src="./img/photo.svg" alt="Photo">
                <span class="stats__count">43 поста</span>
            </div>
        </div>
        <div class="gallery">
            <img class="gallery__item" width="322" height="322" src="./img/winter_street.jpg" alt="Winter street">
            <img class="gallery__item" width="322" height="322" src="./img/town_view.jpg" alt="Town view">
            <img class="gallery__item" width="322" height="322" src="./img/chocolate_marquise.jpg" alt="Chocolate marquise">
            <img class="gallery__item" width="322" height="322" src="./img/ispring_cosmos.jpg" alt="iSpring cosmos">
            <img class="gallery__item" width="322" height="322" src="./img/rockets_coffee.jpg" alt="Rockets coffee">
            <img class="gallery__item" width="322" height="322" src="./img/book_page.jpg" alt="Book page">
            <img class="gallery__item" width="322" height="322" src="./img/sunny_day.jpg" alt="Sunny day">
            <img class="gallery__item" width="322" height="322" src="./img/selfie_on_the_plane.jpg" alt="Selfie">
            <img class="gallery__item" width="322" height="322" src="./img/white_pan.jpg" alt="White pan">
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Профиль • Социальная сеть</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./profile_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <a href="#"><img class="sidebar_icon" width="40" height="40" src="./img/home_icon.png" alt="Home"></a>
        <a href="#"><img class="sidebar_icon" width="40" height="40" src="./img/profile_icon.png" alt="Profile"></a>
        <a href="#"><img class="sidebar_icon" width="40" height="40" src="./img/plus_icon.png" alt="Plus"></a>
    </nav>
    <div class="profile">
        <div class="about">
            <img class="about_avatar" width="123" height="123" src="./img/vanya_denisov.jpg" alt="Vanya Denisov">
            <h1 class="about_name">Ваня Денисов</h1>
            <p class="about_bio">
                Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!
            </p>
            <div class="stats">
                <img class="stats_icon" width="16" height="16" src="./img/photo_icon.png" alt="Photo">
                <span class="stats_count">43 поста</span>
            </div>
        </div>
        <div class="gallery">
            <img class="gallery_item" width="322" height="322" src="./img/winter_street.jpg" alt="Winter street">
            <img class="gallery_item" width="322" height="322" src="./img/town_view.jpg" alt="Town view">
            <img class="gallery_item" width="322" height="322" src="./img/chocolate_marquise.jpg" alt="Chocolate marquise">
            <img class="gallery_item" width="322" height="322" src="./img/ispring_cosmos.jpg" alt="iSpring cosmos">
            <img class="gallery_item" width="322" height="322" src="./img/rockets_coffee.jpg" alt="Rockets coffee">
            <img class="gallery_item" width="322" height="322" src="./img/book_page.jpg" alt="Book page">
            <img class="gallery_item" width="322" height="322" src="./img/sunny_day.jpg" alt="Sunny day">
            <img class="gallery_item" width="322" height="322" src="./img/selfie_on_the_plane.jpg" alt="Selfie">
            <img class="gallery_item" width="322" height="322" src="./img/white_pan.jpg" alt="White pan">
        </div>
    </div>
</body>
</html>

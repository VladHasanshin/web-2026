<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма</title>
    <link rel="stylesheet" href="styles.css">
    <script src="./script.js"></script>
</head>
<body>
    <div class="main">
        <button class="send-form">Отправить форму</button>
        <form action="#" class="form" method="post">
            <div class="field">
                <label for="email" class="field__label">Почта</label>
                <input type="email" class="field__input" id="email">
            </div>
            <div class="field">
                <label for="password" class="field__label">Пароль</label>
                <input type="password" class="field__input" id="password">
            </div>
            <button class="form__button">Продолжить</button>
        </form>
    </div>
</body>
</html>
